<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mission HUD</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hud" id="hud">

  <div class="topline"></div>

  <div class="content">
    <div class="label">MISSION CONTROL</div>
    <div class="timer" id="timer">T-00:20</div>
    <div class="status" id="status">SYSTEMS NOMINAL</div>
  </div>

  <div class="center" id="center">T+00:00</div>

</div>

<div id="abortScreen">MISSION ABORTED</div>

<script src="renderer.js"></script>
</body>
</html>
